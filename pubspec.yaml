name: greenie
description: "For your golf leagues"
publish_to: "none"
version: 0.0.1
environment:
  sdk: ^3.9.2
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  go_router: ^16.2.2
  riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
dev_dependencies:
  build_runner:
  custom_lint:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^3.0.0
  riverpod_lint: ^3.0.0
flutter:
  uses-material-design: true
flutter_launcher_icons:
  ios: true
  android: true
  image_path_ios: "assets/app/greenie_icon.png"
  image_path_android: "assets/app/greenie_icon.png"
  remove_alpha_ios: true